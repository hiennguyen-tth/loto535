name: Crawl Lotto 5/35

on:
  schedule:
    - cron: '30 6 * * *'   # 13:30 VN = 06:30 UTC
    - cron: '0 15 * * *'   # 22:00 VN = 15:00 UTC
  workflow_dispatch:        # Chạy thủ công từ GitHub Actions UI

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger crawl on production
        run: |
          echo "Triggering crawl on lotto535.fly.dev..."
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST https://lotto535.fly.dev/api/crawl \
            -H "X-Admin-Key: ${{ secrets.FLY_ADMIN_KEY }}" \
            -H "Content-Type: application/json" \
            --max-time 60)
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -1)
          echo "Response: $BODY"
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "Crawl trigger failed with HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Trigger score recalculate
        run: |
          curl -s -X POST https://lotto535.fly.dev/api/recalculate \
            -H "X-Admin-Key: ${{ secrets.FLY_ADMIN_KEY }}" \
            --max-time 30
          echo "Recalculate triggered."

