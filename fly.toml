# fly.toml app configuration file generated for lotto535 on 2026-04-16T17:24:22+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'lotto535'
primary_region = 'sin'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'suspend'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[mounts]]
  source = "lotto535_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = '1gb'
  cpus = 1
  memory_mb = 1024
